name: Deploy to ambozygraphics.com

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Deploy via FTP ────────────────────────────────────────────
      # config.local.php lives only on the server — never in GitHub.
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:       ${{ secrets.FTP_HOST }}
          username:     ${{ secrets.FTP_USER }}
          password:     ${{ secrets.FTP_PASS }}
          port:         21
          protocol:     ftp
          local-dir:    ./
          server-dir:   ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            config.local.php
            schema.sql
            crm_schema.sql
            README.md
            *.md
            *.zip
            *.log

      - name: Deployment complete
        run: echo "✅ Deployed to ambozygraphics.com"
