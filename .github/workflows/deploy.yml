name: Deploy to ambozygraphics.shop

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Create config.local.php from GitHub Secrets ──────────────
      - name: Inject production config
        run: |
          cat > config.local.php << 'PHPEOF'
          <?php
          define('SITE_NAME',  'Ambozy Graphics Solutions Ltd');
          define('SITE_URL',   'https://ambozygraphics.shop');
          define('SITE_EMAIL', 'ambozygraphics@gmail.com');
          define('SITE_PHONE', '+256 782 187 799');
          define('WHATSAPP_NO','256782187799');

          define('DB_HOST',    '${{ secrets.DB_HOST }}');
          define('DB_NAME',    '${{ secrets.DB_NAME }}');
          define('DB_USER',    '${{ secrets.DB_USER }}');
          define('DB_PASS',    '${{ secrets.DB_PASS }}');
          define('DB_CHARSET', 'utf8mb4');

          define('ADMIN_USER', '${{ secrets.ADMIN_USER }}');
          define('ADMIN_HASH', '${{ secrets.ADMIN_HASH }}');

          define('MAIL_FROM',  'noreply@ambozygraphics.shop');
          define('MAIL_TO',    'ambozygraphics@gmail.com');

          try {
              $dsn = 'mysql:host=' . DB_HOST . ';dbname=' . DB_NAME . ';charset=' . DB_CHARSET;
              $pdo = new PDO($dsn, DB_USER, DB_PASS, [
                  PDO::ATTR_ERRMODE            => PDO::ERRMODE_EXCEPTION,
                  PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,
                  PDO::ATTR_EMULATE_PREPARES   => false,
              ]);
          } catch (PDOException $e) {
              $pdo = null;
              error_log('Ambozy DB: ' . $e->getMessage());
          }
          PHPEOF

      # ── Deploy via FTP ────────────────────────────────────────────
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:       ${{ secrets.FTP_HOST }}
          username:     ${{ secrets.FTP_USER }}
          password:     ${{ secrets.FTP_PASS }}
          port:         21
          protocol:     ftp
          local-dir:    ./
          server-dir:   ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            config.php
            schema.sql
            README.md
            *.md
            *.zip
            *.log

      - name: Deployment complete
        run: echo "✅ Deployed to ambozygraphics.shop"
